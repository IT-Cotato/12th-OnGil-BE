spring:
  datasource:
    # 테스트용 메모리 DB 주소 설정
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    # 테스트 시작 시 테이블 생성(create), 종료 시 삭제(drop)
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect